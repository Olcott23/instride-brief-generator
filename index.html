        * {

            padding: 0;
            box-sizing: border-box;
        }

            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            padding: 20px;
        }
 
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 8px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }
 
        .header {
            background: linear-gradient(135deg, #0d9488 0%, #06b6d4 100%);
            color: white;
            padding: 40px 20px;
            text-align: center;
        }
 
        .header h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
        }
 
        .header-logo {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }
 
        .header p {
            font-size: 14px;
            opacity: 0.95;
        }
 
        .content {
            padding: 40px;
        }
 
        .form-section {
            display: block;
        }
 
        .form-section.hidden {
            display: none;
        }
 
        .brief-section {
            display: none;
        }
 
        .brief-section.visible {
            display: block;
        }
 
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }
 
        .form-group {
            display: flex;
            flex-direction: column;
        }
 
        .form-group.full {
            grid-column: 1 / -1;
        }
 
        label {
            font-weight: 600;
            color: #1f2937;
            margin-bottom: 8px;
            font-size: 14px;
        }
 
        input, select {
            padding: 12px;
            border: 2px solid #e5e7eb;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s;
            font-family: inherit;
        }
 
        input:focus, select:focus {
            outline: none;
            border-color: #0d9488;
            box-shadow: 0 0 0 3px rgba(13, 148, 136, 0.1);
        }
 
        .button-group {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
 
        button {
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
 
        .btn-primary {
            background: linear-gradient(135deg, #0d9488 0%, #06b6d4 100%);
            color: white;
        }
 
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(13, 148, 136, 0.3);
        }
 
        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
 
        .btn-secondary {
            background: #f3f4f6;
            color: #374151;
            border: 2px solid #d1d5db;
        }
 
        .btn-secondary:hover {
            background: #e5e7eb;
        }
 
        .btn-small {
            padding: 8px 16px;
            font-size: 13px;
        }
 
        .loading {
            display: none;
            text-align: center;
            padding: 40px;
        }
 
        .loading.active {
            display: block;
        }
 
        .spinner {
            border: 4px solid #e5e7eb;
            border-top-color: #0d9488;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }
 
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
 
        .error-message {
            background: #fee2e2;
            color: #991b1b;
            padding: 16px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
            border-left: 4px solid #dc2626;
        }
 
        .error-message.visible {
            display: block;
        }
 
        .provider-selector {
            background: #f9fafb;
            padding: 20px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
        }
 
        .provider-selector.visible {
            display: block;
        }
 
        .provider-option {
            background: white;
            padding: 16px;
            border: 2px solid #e5e7eb;
            border-radius: 6px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
 
        .provider-option:hover {
            border-color: #0d9488;
            background: #f0fdf4;
        }
 
        .provider-option.selected {
            border-color: #0d9488;
            background: #ecfdf5;
        }
 
        .provider-option strong {
            display: block;
            margin-bottom: 4px;
            color: #1f2937;
        }
 
        .provider-option small {
            color: #6b7280;
        }

        }
 
        .brief-controls {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
 
        .brief {
            background: white;
            padding: 40px;
            border: 1px solid #e5e7eb;
            border-radius: 6px;
            font-size: 13px;
            line-height: 1.6;
            color: #1f2937;
        }
 
        @media print {

                background: white;
                padding: 0;
            }
            .container {
                box-shadow: none;
                border-radius: 0;
            }
            .header {
                padding: 20px;
            }
            .brief-controls {
                display: none;
            }

        .brief-header {

            grid-template-columns: auto 1fr auto;
            gap: 40px;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #0d9488;
            align-items: start;

            font-weight: 700;
            color: #0d9488;
            letter-spacing: 1px;

            margin-bottom: 4px;
        }
 
        .brief-title p {

        }
 
        .brief-meta {

            color: #6b7280;
        }
 
        .tm-name-field {

            margin-bottom: 8px;
        }
 
        .brief-content {

            gap: 30px;
            margin-bottom: 30px;
        }
 
        .brief-section-box {
            background: #f9fafb;
            padding: 20px;
            border-radius: 6px;
            border-left: 4px solid #0d9488;

            color: #0d9488;
            margin-bottom: 12px;

            margin-bottom: 6px;

        }

            color: #1f2937;
        }

        }

            font-size: 13px;
            font-weight: 700;
            color: #0d9488;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
 
        .positioning-bullets {
            list-style: none;
        }
 
        .positioning-bullets li {
            margin-bottom: 10px;
            padding-left: 20px;
            position: relative;
            font-size: 12px;
        }
 
        .positioning-bullets li:before {
            content: "→";
            position: absolute;
            left: 0;
            color: #0d9488;
            font-weight: bold;
        }
 
        .checklist {
            list-style: none;
            grid-column: 1 / -1;

            display: flex;
            align-items: center;
            margin-bottom: 8px;
            font-size: 12px;

            height: 16px;

            font-style: italic;

            }
 
            .brief-header .brief-meta {
                grid-column: 1 / -1;
                text-align: left;
            }
 
            .brief-content {
                grid-template-columns: 1fr;
                gap: 20px;
            }
 
            .button-group {
                flex-direction: column;
            }

            color: #166534;
            padding: 16px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
            border-left: 4px solid #22c55e;
        }
 
        .success-message.visible {
            display: block;
        }

                        <input type="text" id="firstName" placeholder="John" required>
                    </div>
                    <div class="form-group">
                        <label for="lastName">Provider Last Name *</label>
                        <input type="text" id="lastName" placeholder="Smith" required>
                    </div>
                    <div class="form-group">
                        <label for="zipCode">Zip Code *</label>
                        <input type="text" id="zipCode" placeholder="10001" required pattern="\d{5}">
                    </div>
                    <div class="form-group">
                        <label for="practiceName">Practice Name *</label>
                        <input type="text" id="practiceName" placeholder="Smith Medical Associates" required>
                    </div>
                    <div class="form-group full">
                        <label for="email">Email (Optional)</label>
                        <input type="email" id="email" placeholder="john@example.com">
                    </div>
                    <div class="form-group full">
                        <label for="tmName">Your Name (Territory Manager) *</label>
                        <input type="text" id="tmName" placeholder="Your full name" required>
                    </div>
                </div>
 
                <div class="provider-selector" id="providerSelector">
                    <h3 style="margin-bottom: 16px; color: #1f2937; font-size: 14px;">Multiple providers found. Select the correct one:</h3>
                    <div id="providerList"></div>
                    <div class="button-group" style="margin-top: 16px;">
                        <button class="btn-secondary" onclick="cancelProviderSelection()">Cancel</button>
                        <button class="btn-primary" id="confirmProviderBtn" disabled onclick="displayBrief()">Confirm Selection</button>
                    </div>
                </div>
 
                <div class="loading" id="loading">
                    <div class="spinner"></div>
                    <p id="loadingText">Retrieving provider information...</p>
                </div>
 
                <div class="button-group">
                    <button class="btn-primary" onclick="generateBrief()">Generate Brief</button>
                    <button class="btn-secondary" onclick="resetForm()">Clear Form</button>
                </div>
            </div>
 
            <!-- Brief Section -->
            <div class="brief-section" id="briefSection">
                <div class="brief-wrapper">
                    <div class="brief-controls">
                        <button class="btn-secondary btn-small" onclick="backToForm()">Back to Form</button>
                        <button class="btn-primary btn-small" onclick="downloadPDF()">Download PDF</button>
                        <button class="btn-secondary btn-small" onclick="window.print()">Print</button>
                    </div>
 
                    <div class="brief" id="briefContent">
                        <!-- Brief content will be generated here -->
                    </div>
                </div>
            </div>
        </div>
    </div>

            const zipCode = document.getElementById('zipCode').value.trim();
            const practiceName = document.getElementById('practiceName').value.trim();
            const tmName = document.getElementById('tmName').value.trim();
 
            if (!firstName || !lastName || !zipCode || !practiceName || !tmName) {
                showError('Please fill in all required fields.');
                return false;
            }
 
            if (!/^\d{5}$/.test(zipCode)) {
                showError('Zip code must be 5 digits.');
                return false;
            }
 
            return true;
        }
 
        async function generateBrief() {
            if (!validateForm()) return;
 
            const firstName = document.getElementById('firstName').value.trim();
            const lastName = document.getElementById('lastName').value.trim();
            const zipCode = document.getElementById('zipCode').value.trim();
 
            document.getElementById('loading').classList.add('active');
            document.getElementById('errorMessage').classList.remove('visible');
 
            try {
                const npiUrl = `https://npiregistry.cms.hhs.gov/api/?version=2.1&first_name=${encodeURIComponent(firstName)}&last_name=${encodeURIComponent(lastName)}&postal_code=${zipCode}&enumeration_type=NPI-1&limit=5`;
 
                let data = null;
 
                // Try direct fetch first (works when hosted on a web server)
                try {
                    const response = await fetch(npiUrl);
                    if (response.ok) {
                        data = await response.json();
                    }
                } catch (e) {
                    // Direct fetch failed (likely CORS from file:// origin), try proxies
                }
 
                // If direct fetch failed, try CORS proxies (needed when opening as local file)
                if (!data) {
                    const proxies = [
                        'https://corsproxy.io/?url=',
                        'https://api.allorigins.win/raw?url='
                    ];
                    for (const proxy of proxies) {
                        try {
                            document.getElementById('loadingText').textContent = 'Connecting via alternate route...';
                            const proxyResponse = await fetch(proxy + encodeURIComponent(npiUrl));
                            if (proxyResponse.ok) {
                                data = await proxyResponse.json();
                                break;
                            }
                        } catch (e) {
                            continue;
                        }
                    }
                    document.getElementById('loadingText').textContent = 'Retrieving provider information...';
                }
 
                if (!data) {
                    throw new Error(
                        'Unable to reach the NPI Registry. This is usually caused by opening the file directly from your computer. ' +
                        'For the best experience, host this file on GitHub Pages (see setup instructions) or try a different network.'
                    );
                }
 
                if (!data.results || data.results.length === 0) {
                    throw new Error(`No provider found with the name ${firstName} ${lastName} in zip code ${zipCode}. Please verify the information and try again.`);
                }
 
                currentProviderResults = data.results;
 
                if (data.results.length === 1) {
                    selectedProvider = data.results[0];
                    displayBrief();
                } else {
                    showProviderSelector();
                }
            } catch (error) {
                showError(error.message);
            } finally {
                document.getElementById('loading').classList.remove('active');
            }
        }
 
        function showProviderSelector() {
            const selector = document.getElementById('providerSelector');
            const list = document.getElementById('providerList');
            list.innerHTML = '';
 
            currentProviderResults.forEach((provider, index) => {
                const npiData = provider.basic;
                const name = `${npiData.first_name || ''} ${npiData.last_name || ''}`.trim();
                const taxonomy = provider.taxonomies && provider.taxonomies.length > 0
                    ? provider.taxonomies[0].desc
                    : 'Healthcare Provider';
                const address = provider.addresses && provider.addresses.length > 0
                    ? `${provider.addresses[0].address_1}, ${provider.addresses[0].city}, ${provider.addresses[0].state}`
                    : 'Address not available';
 
                const option = document.createElement('div');
                option.className = 'provider-option';
                option.onclick = () => selectProvider(index);
                option.innerHTML = `
                    <strong>${name}</strong>
                    <small>${taxonomy}</small>
                    <small>${address}</small>
                    <small>NPI: ${provider.number}</small>
                `;
                list.appendChild(option);
            });
 
            selector.classList.add('visible');
        }
 
        function selectProvider(index) {
            document.querySelectorAll('.provider-option').forEach((el, i) => {
                el.classList.toggle('selected', i === index);
            });
            document.getElementById('confirmProviderBtn').disabled = false;
            selectedProvider = currentProviderResults[index];
        }
 
        function cancelProviderSelection() {
            document.getElementById('providerSelector').classList.remove('visible');
            selectedProvider = null;
            currentProviderResults = [];
        }
 
        function displayBrief() {
            const firstName = document.getElementById('firstName').value.trim();
            const lastName = document.getElementById('lastName').value.trim();
            const zipCode = document.getElementById('zipCode').value.trim();
            const practiceName = document.getElementById('practiceName').value.trim();
            const tmName = document.getElementById('tmName').value.trim();
 
            const npiData = selectedProvider.basic;
            const credential = npiData.credential || '';
            const providerName = `${npiData.first_name || ''} ${npiData.last_name || ''}${credential ? ', ' + credential : ''}`.trim();
            const npiNumber = selectedProvider.number;
            const email = document.getElementById('email').value.trim();
 
            // Get taxonomy/specialty
            let specialty = 'Healthcare Provider';
            let taxonomyCode = '';
            if (selectedProvider.taxonomies && selectedProvider.taxonomies.length > 0) {
                specialty = selectedProvider.taxonomies[0].desc;
                taxonomyCode = selectedProvider.taxonomies[0].code;
            }
 
            // Get address and phone
            let address = 'Not available via NPI';
            let city = '';
            let state = '';
            let phone = 'Not available';
            if (selectedProvider.addresses && selectedProvider.addresses.length > 0) {
                const addr = selectedProvider.addresses[0];
                address = `${addr.address_1}${addr.address_2 ? ', ' + addr.address_2 : ''}, ${addr.city}, ${addr.state} ${addr.postal_code}`;
                city = addr.city;
                state = addr.state;
                phone = addr.telephone_number || 'Not available';
            }
 
            // Calculate years in practice from enumeration date
            let yearsInPractice = 'Not available via NPI';
            if (npiData.enumeration_date) {
                const enumDate = new Date(npiData.enumeration_date);
                const today = new Date();
                const years = Math.floor((today - enumDate) / (1000 * 60 * 60 * 24 * 365.25));
                if (years >= 0) {
                    yearsInPractice = years > 0 ? `${years} years` : 'Less than 1 year';
                }
            }
 
            // Get demographics
            const demos = getDemographics(zipCode, state);
 
            // Get insurance payers
            const payers = getInsurancePayers(state);
 
            // Get talking points
            const points = getTalkingPoints(specialty, taxonomyCode);
 
            // Generate brief HTML
            const briefHTML = `
                <div class="brief-header">
                    <div class="brief-logo">IN STRIDE</div>
                    <div class="brief-title">
                        <h2>Provider Meeting Brief</h2>
                        <p>Meeting preparation document</p>
                    </div>
                    <div class="brief-meta">
                        <div class="tm-name-field"><strong>Territory Manager:</strong><br>${tmName}</div>
                        <div><strong>Generated:</strong><br>${formatDate(new Date())}</div>
                    </div>
                </div>
 
                <div class="brief-content">
                    <div class="brief-section-box">
                        <h3>Provider Snapshot</h3>
                        <p><strong>Name:</strong><br>${providerName}</p>
                        <p><strong>Primary Specialty:</strong><br>${specialty}</p>
                        <p><strong>NPI Number:</strong><br>${npiNumber}</p>
                        <p><strong>Years in Practice:</strong><br>${yearsInPractice}</p>
                        <p><strong>Medical School/Training:</strong><br>Not available via NPI - verify before meeting</p>
                        ${email ? `<p><strong>Email:</strong><br>${email}</p>` : ''}
                    </div>
 
                    <div class="brief-section-box">
                        <h3>Practice Information</h3>
                        <p><strong>Practice Name:</strong><br>${practiceName}</p>
                        <p><strong>Address:</strong><br>${address}</p>
                        <p><strong>Phone:</strong><br>${phone}</p>
                        <p><strong>Patient Volume Indicator:</strong><br>${demos.volumeIndicator}</p>
                    </div>
 
                    <div class="brief-section-box brief-section-full">
                        <h3>Market & Demographics Context</h3>
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                            <div>
                                <p><strong>Service Area:</strong><br>${city}, ${state} ${zipCode}</p>
                                <p><strong>Population (Est.):</strong><br>${demos.population.toLocaleString()} residents</p>
                                <p><strong>Median Age:</strong><br>${demos.medianAge} years</p>
                                <p><strong>Pediatric Population:</strong><br>${demos.pctUnder18}% under 18</p>
                            </div>
                            <div>
                                <p><strong>Top Insurance Payers:</strong></p>
                                <ul style="list-style: none; padding-left: 0; font-size: 12px;">
                                    ${payers.slice(0, 4).map(p => `<li>• ${p}</li>`).join('')}
                                </ul>
                            </div>
                        </div>
                        <p style="margin-top: 12px; font-size: 11px; color: #6b7280; font-style: italic;">
                            <strong>Note:</strong> Demographics are estimates based on region—verify with local market data.
                        </p>
                    </div>
 
                    <div class="brief-section-box brief-section-full">
                        <h3>InStride Positioning</h3>
                        <ul class="positioning-bullets">
                            ${points.map(p => `<li>${p}</li>`).join('')}
                        </ul>
                    </div>
 
                    <div class="brief-section-box brief-section-full">
                        <h3>Meeting Prep Checklist</h3>
                        <ul class="checklist">
                            <li><input type="checkbox"> Verified provider background and credentials</li>
                            <li><input type="checkbox"> Reviewed practice website and current services</li>
                            <li><input type="checkbox"> Checked for existing InStride relationships</li>
                            <li><input type="checkbox"> Prepared leave-behind materials and ROI data</li>
                            <li><input type="checkbox"> Confirmed meeting time and contact information</li>
                        </ul>
                    </div>
                </div>
 
                <div class="disclaimer">
                    <strong>Disclaimer:</strong> This brief was generated using publicly available NPI Registry data and demographic estimates.
                    All information should be verified with current provider records and local market data before the meeting.
                    This document is for internal use only and contains confidential business information.
                </div>
            `;
 
            document.getElementById('briefContent').innerHTML = briefHTML;
            document.getElementById('formSection').classList.add('hidden');
            document.getElementById('briefSection').classList.add('visible');
            document.getElementById('providerSelector').classList.remove('visible');
            showSuccess('Brief generated successfully!');
        }
 
        function getDemographics(zipCode, state) {
            let demos = demoDataByZip[zipCode];
 
            if (!demos && state && stateAverageDemos[state]) {
                demos = { ...stateAverageDemos[state], city: 'Area', state: state };
            }
 
            if (!demos) {
                demos = { population: 35000, medianAge: 37, pctUnder18: 19, city: 'Service Area', state: state || 'US' };
            }
 
            // Volume indicator based on population
            let volumeIndicator = 'Standard volume area';
            if (demos.population > 45000) {
                volumeIndicator = 'High-density urban area';
            } else if (demos.population < 30000) {
                volumeIndicator = 'Lower-density suburban/rural area';
            }
 
            return { ...demos, volumeIndicator };
        }
 
        function getInsurancePayers(state) {
            const stateCode = state ? state.toUpperCase() : 'CA';
            return insuranceByState[stateCode] || insuranceByState['CA'];
        }
 
        function getTalkingPoints(specialty, taxonomyCode) {
            const specialtyLower = specialty.toLowerCase();
 
            if (specialtyLower.includes('pediatric') || specialtyLower.includes('pediatrician')) {
                return talkingPointsBySpecialty.pediatrics;
            } else if (specialtyLower.includes('family') || specialtyLower.includes('general practice')) {
                return talkingPointsBySpecialty['family medicine'];
            } else if (specialtyLower.includes('psychiatry') || specialtyLower.includes('psychiatrist')) {
                return talkingPointsBySpecialty.psychiatry;
            } else if (specialtyLower.includes('psychology') || specialtyLower.includes('psychologist')) {
                return talkingPointsBySpecialty.psychology;
            } else if (specialtyLower.includes('nurse practitioner') || specialtyLower.includes('physician assistant')) {
                return talkingPointsBySpecialty['nurse practitioner'];
            }
 
            return talkingPointsBySpecialty.default;
        }
 
        function formatDate(date) {
            const options = { year: 'numeric', month: 'short', day: 'numeric' };
            return date.toLocaleDateString('en-US', options);
        }
 
        function downloadPDF() {
            const briefContent = document.getElementById('briefContent');
            const tmName = document.getElementById('tmName').value.trim() || 'Brief';
            const fileName = `InStride-Provider-Brief-${formatDate(new Date()).replace(/\s/g, '-')}.pdf`;
 
            const opt = {
                margin: 10,
                filename: fileName,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2 },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };
 
            html2pdf().set(opt).from(briefContent).save();
        }
 
        function backToForm() {
            document.getElementById('formSection').classList.remove('hidden');
            document.getElementById('briefSection').classList.remove('visible');
            selectedProvider = null;
        }
 
        function resetForm() {
            document.getElementById('firstName').value = '';
            document.getElementById('lastName').value = '';
            document.getElementById('zipCode').value = '';
            document.getElementById('practiceName').value = '';
            document.getElementById('email').value = '';
            document.getElementById('tmName').value = '';
            document.getElementById('errorMessage').classList.remove('visible');
            document.getElementById('successMessage').classList.remove('visible');
            document.getElementById('providerSelector').classList.remove('visible');
            selectedProvider = null;
            currentProviderResults = [];
        }
 
        // Add Enter key support for form
        document.addEventListener('DOMContentLoaded', function() {
            const inputs = document.querySelectorAll('input[type="text"], input[type="email"]');
            inputs.forEach(input => {
                input.addEventListener('keypress', function(e) {
                    if (e.key === 'Enter' && document.getElementById('formSection').style.display !== 'none') {
                        generateBrief();
                    }
                });
            });
        });
    </script>
</body>
</html>
