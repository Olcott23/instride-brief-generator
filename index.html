<html lang="en">

            padding: 0;
            box-sizing: border-box;
        }

            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            padding: 20px;
        }
 
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 8px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }
 
        .header {
            background: linear-gradient(135deg, #0d9488 0%, #06b6d4 100%);
            color: white;
            padding: 40px 20px;
            text-align: center;
        }
 
        .header h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
        }
 
        .header-logo {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }
 
        .header p {
            font-size: 14px;
            opacity: 0.95;
        }
 
        .content {
            padding: 40px;
        }
 
        .form-section {
            display: block;
        }
 
        .form-section.hidden {
            display: none;
        }
 
        .brief-section {
            display: none;
        }
 
        .brief-section.visible {
            display: block;
        }
 
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }
 
        .form-group {
            display: flex;
            flex-direction: column;
        }
 
        .form-group.full {
            grid-column: 1 / -1;
        }
 
        label {
            font-weight: 600;
            color: #1f2937;
            margin-bottom: 8px;
            font-size: 14px;
        }
 
        input, select {
            padding: 12px;
            border: 2px solid #e5e7eb;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s;
            font-family: inherit;
        }
 
        input:focus, select:focus {
            outline: none;
            border-color: #0d9488;
            box-shadow: 0 0 0 3px rgba(13, 148, 136, 0.1);
        }
 
        .button-group {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
 
        button {
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
 
        .btn-primary {
            background: linear-gradient(135deg, #0d9488 0%, #06b6d4 100%);
            color: white;
        }
 
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(13, 148, 136, 0.3);
        }
 
        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
 
        .btn-secondary {
            background: #f3f4f6;
            color: #374151;
            border: 2px solid #d1d5db;
        }
 
        .btn-secondary:hover {
            background: #e5e7eb;
        }
 
        .btn-small {
            padding: 8px 16px;
            font-size: 13px;
        }
 
        .loading {
            display: none;
            text-align: center;
            padding: 40px;
        }
 
        .loading.active {
            display: block;
        }
 
        .spinner {
            border: 4px solid #e5e7eb;
            border-top-color: #0d9488;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }
 
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
 
        .error-message {
            background: #fee2e2;
            color: #991b1b;
            padding: 16px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
            border-left: 4px solid #dc2626;
        }
 
        .error-message.visible {
            display: block;
        }
 
        .provider-selector {
            background: #f9fafb;
            padding: 20px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
        }
 
        .provider-selector.visible {
            display: block;
        }
 
        .provider-option {
            background: white;
            padding: 16px;
            border: 2px solid #e5e7eb;
            border-radius: 6px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
 
        .provider-option:hover {
            border-color: #0d9488;
            background: #f0fdf4;
        }
 
        .provider-option.selected {
            border-color: #0d9488;
            background: #ecfdf5;
        }
 
        .provider-option strong {
            display: block;
            margin-bottom: 4px;
            color: #1f2937;
        }
 
        .provider-option small {
            color: #6b7280;
        }

            position: relative;
        }
 
        .brief-controls {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
 
        .brief {
            background: white;
            padding: 40px;
            border: 1px solid #e5e7eb;
            border-radius: 6px;
            font-size: 13px;
            line-height: 1.6;
            color: #1f2937;
        }
 
        @media print {

                padding: 0;
            }
            .container {
                box-shadow: none;
                border-radius: 0;
            }
            .header {
                padding: 20px;
            }
            .brief-controls {
                display: none;
            }
            .research-links-section {
                display: none !important;
            }
        }
 
        .brief-header {
            display: grid;
            grid-template-columns: auto 1fr auto;
            gap: 40px;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #0d9488;
            align-items: start;

            font-weight: 700;
            color: #0d9488;
            letter-spacing: 1px;
        }
 
        .brief-title {

            color: #1f2937;
            margin-bottom: 4px;
        }
 
        .brief-title p {
            font-size: 12px;
            color: #6b7280;
        }
 
        .brief-meta {
            text-align: right;
            font-size: 11px;
            color: #6b7280;
        }
 
        .tm-name-field {
            font-size: 12px;
            margin-bottom: 8px;
        }
 
        .brief-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }
 
        .brief-section-box {
            background: #f9fafb;
            padding: 20px;
            border-radius: 6px;

        }

            font-weight: 700;
            color: #0d9488;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
 
        .brief-section-box.highlight-amber h3 {
            color: #d97706;
        }
 
        .brief-section-box p {
            font-size: 12px;
            margin-bottom: 6px;
            line-height: 1.5;
        }
 
        .brief-section-box strong {
            color: #1f2937;
        }

        }

            font-weight: 700;
            color: #0d9488;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;

            padding-left: 20px;
            position: relative;
            font-size: 12px;

        .positioning-bullets li:before {

            left: 0;
            color: #0d9488;
            font-weight: bold;
        }
 
        .checklist {

            margin-bottom: 8px;

            }

            border-radius: 6px;
            margin-bottom: 20px;

            border-left: 4px solid #22c55e;
        }

            display: block;
        }

                    <div class="form-group full">

                    <div class="brief" id="briefContent">

                </div>
            </div>
        </div>

        // Smart NPI search with retry logic for hyphenated names and without zip
        async function searchNPI(firstName, lastName, zipCode) {
            const searchStrategies = [];
 
            // Strategy 1: Exact name with zip (if provided)
            if (zipCode) {
                searchStrategies.push({
                    label: 'exact name + zip',
                    url: `https://npiregistry.cms.hhs.gov/api/?version=2.1&first_name=${encodeURIComponent(firstName)}&last_name=${encodeURIComponent(lastName)}&postal_code=${zipCode}&enumeration_type=NPI-1&limit=10`
                });
            }
 
            // Strategy 2: Exact name without zip
            searchStrategies.push({
                label: 'exact name (any location)',
                url: `https://npiregistry.cms.hhs.gov/api/?version=2.1&first_name=${encodeURIComponent(firstName)}&last_name=${encodeURIComponent(lastName)}&enumeration_type=NPI-1&limit=10`
            });
 
            // Strategy 3: If hyphenated last name, try last portion
            if (lastName.includes('-')) {
                const parts = lastName.split('-');
                const lastPart = parts[parts.length - 1];
                const firstPart = parts[0];
                if (zipCode) {
                    searchStrategies.push({
                        label: `last name "${lastPart}" + zip`,
                        url: `https://npiregistry.cms.hhs.gov/api/?version=2.1&first_name=${encodeURIComponent(firstName)}&last_name=${encodeURIComponent(lastPart)}&postal_code=${zipCode}&enumeration_type=NPI-1&limit=10`
                    });
                }
                searchStrategies.push({
                    label: `last name "${lastPart}" (any location)`,
                    url: `https://npiregistry.cms.hhs.gov/api/?version=2.1&first_name=${encodeURIComponent(firstName)}&last_name=${encodeURIComponent(lastPart)}&enumeration_type=NPI-1&limit=10`
                });
                searchStrategies.push({
                    label: `last name "${firstPart}" (any location)`,
                    url: `https://npiregistry.cms.hhs.gov/api/?version=2.1&first_name=${encodeURIComponent(firstName)}&last_name=${encodeURIComponent(firstPart)}&enumeration_type=NPI-1&limit=10`
                });
            }
 
            // Strategy 4: Wildcard last name (NPI supports * wildcard)
            if (lastName.length > 3) {
                const wildcard = lastName.substring(0, 4) + '*';
                searchStrategies.push({
                    label: `wildcard "${wildcard}"`,
                    url: `https://npiregistry.cms.hhs.gov/api/?version=2.1&first_name=${encodeURIComponent(firstName)}&last_name=${encodeURIComponent(wildcard)}&enumeration_type=NPI-1&limit=10`
                });
            }
 
            for (let i = 0; i < searchStrategies.length; i++) {
                const strategy = searchStrategies[i];
                console.log(`[NPI Search] Trying strategy: ${strategy.label}`);
                document.getElementById('loadingText').textContent =
                    i === 0 ? 'Searching NPI Registry...' : `Trying alternate search (${strategy.label})...`;
 
                const data = await fetchWithProxy(strategy.url);
 
                if (data && data.results && data.results.length > 0) {
                    console.log(`[NPI Search] Found ${data.results.length} result(s) via: ${strategy.label}`);
                    return data;
                }
            }
 
            return null;
        }
 
        // Reusable CORS proxy function
        async function fetchWithProxy(url, options = {}) {
            const proxies = [
                { name: 'corsproxy.io', url: 'https://corsproxy.io/?' + encodeURIComponent(url) },
                { name: 'allorigins', url: 'https://api.allorigins.win/raw?url=' + encodeURIComponent(url) },
                { name: 'cors-anywhere', url: 'https://cors-proxy.htmldriven.com/?url=' + encodeURIComponent(url) }
            ];
 
            for (let i = 0; i < proxies.length; i++) {
                const proxy = proxies[i];
                try {
                    console.log(`[API Fetch] Trying proxy: ${proxy.name}...`);
                    const response = await fetch(proxy.url, {
                        ...options,
                        // For proxied requests, don't set body method if it's already POST
                    });
 
                    if (!response.ok) {
                        console.warn(`[API Fetch] ${proxy.name} returned HTTP ${response.status}`);
                        continue;
                    }
 
                    const text = await response.text();
                    try {
                        return JSON.parse(text);
                    } catch (parseErr) {
                        const jsonMatch = text.match(/\{[\s\S]*\}/);
                        if (jsonMatch) {
                            return JSON.parse(jsonMatch[0]);
                        } else {
                            console.warn(`[API Fetch] ${proxy.name} returned non-JSON response`);
                            continue;
                        }
                    }
                } catch (err) {
                    console.warn(`[API Fetch] ${proxy.name} failed:`, err.message);
                    continue;
                }
            }
 
            return null;
        }

        function summarizeOpenPayments(data) {
            if (!data || !data.data || data.data.length === 0) {
                return null;
            }
 
            const payments = data.data;
            let totalAmount = 0;
            const companies = {};
            const categories = {};
 
            payments.forEach(payment => {
                const amount = parseFloat(payment[10]) || 0;
                totalAmount += amount;
 
                const company = payment[6] || 'Unknown';
                companies[company] = (companies[company] || 0) + amount;
 
                const category = payment[13] || 'Other';
                categories[category] = (categories[category] || 0) + 1;
            });
 
            const topCompanies = Object.entries(companies)
                .sort((a, b) => b[1] - a[1])
                .slice(0, 3)
                .map(([name, amount]) => ({ name, amount }));
 
            return {
                totalPayments: payments.length,
                totalAmount,
                topCompanies,
                categories: Object.entries(categories).map(([name, count]) => ({ name, count }))
            };
        }

                    <small>${taxonomy}</small>
                    <small>${address}</small>
                    <small>NPI: ${provider.number}</small>
                `;
                list.appendChild(option);
            });
 
            selector.classList.add('visible');
        }
 
        function selectProvider(index) {
            document.querySelectorAll('.provider-option').forEach((el, i) => {
                el.classList.toggle('selected', i === index);
            });
            document.getElementById('confirmProviderBtn').disabled = false;
            selectedProvider = currentProviderResults[index];
        }
 
        function cancelProviderSelection() {
            document.getElementById('providerSelector').classList.remove('visible');
            selectedProvider = null;
            currentProviderResults = [];
        }
 
        function buildResearchLinksHTML(firstName, lastName, specialty, city, state, npiNumber) {
            const encodedName = encodeURIComponent(`${firstName} ${lastName}`);
            const encodedSpecialty = encodeURIComponent(specialty);
            const encodedCity = encodeURIComponent(city);
            const encodedState = encodeURIComponent(state);
            const encodedPractice = encodeURIComponent(city);
 
            const links = [
                { label: 'Google Search', url: `https://www.google.com/search?q=${encodedName}+${encodedSpecialty}+${encodedCity}+${encodedState}` },
                { label: 'Healthgrades', url: `https://www.google.com/search?q=site:healthgrades.com+${encodedName}` },
                { label: 'Doximity', url: `https://www.google.com/search?q=site:doximity.com+${encodedName}` },
                { label: 'Google Scholar', url: `https://scholar.google.com/scholar?q=author:"${firstName}+${lastName}"+medicine` },
                { label: 'Care Compare', url: `https://www.medicare.gov/care-compare/?providerType=Physician&geo=${state}` }
            ];
 
            // Add Psychology Today link if mental health specialty
            if (specialty.toLowerCase().includes('psych')) {
                links.push({ label: 'Psychology Today', url: `https://www.google.com/search?q=site:psychologytoday.com+${encodedName}` });
            }
 
            return `
                <div class="research-links-section">
                    <strong style="font-size: 11px; margin-right: 12px;">Quick Links:</strong>
                    ${links.map(link => `<a class="research-link-button" href="${link.url}" target="_blank">${link.label}</a>`).join('')}
                </div>
            `;
        }
 
        async function displayBrief() {
            const firstName = document.getElementById('firstName').value.trim();
            const lastName = document.getElementById('lastName').value.trim();
            const zipCode = document.getElementById('zipCode').value.trim();
            const practiceName = document.getElementById('practiceName').value.trim();
            const tmName = document.getElementById('tmName').value.trim();
 
            const npiData = selectedProvider.basic;
            const credential = npiData.credential || '';
            const providerName = `${npiData.first_name || ''} ${npiData.last_name || ''}${credential ? ', ' + credential : ''}`.trim();
            const npiNumber = selectedProvider.number;
            const email = document.getElementById('email').value.trim();
 
            // Get taxonomy/specialty
            let specialty = 'Healthcare Provider';
            let taxonomyCode = '';
            if (selectedProvider.taxonomies && selectedProvider.taxonomies.length > 0) {
                specialty = selectedProvider.taxonomies[0].desc;
                taxonomyCode = selectedProvider.taxonomies[0].code;
            }
 
            // Get address and phone
            let address = 'Not available via NPI';
            let city = '';
            let state = '';
            let phone = 'Not available';
            if (selectedProvider.addresses && selectedProvider.addresses.length > 0) {
                const addr = selectedProvider.addresses[0];
                address = `${addr.address_1}${addr.address_2 ? ', ' + addr.address_2 : ''}, ${addr.city}, ${addr.state} ${addr.postal_code}`;
                city = addr.city;
                state = addr.state;
                phone = addr.telephone_number || 'Not available';
            }
 
            // Calculate years in practice from enumeration date
            let yearsInPractice = 'Not available via NPI';
            if (npiData.enumeration_date) {
                const enumDate = new Date(npiData.enumeration_date);
                const today = new Date();
                const years = Math.floor((today - enumDate) / (1000 * 60 * 60 * 24 * 365.25));
                if (years >= 0) {
                    yearsInPractice = years > 0 ? `${years} years` : 'Less than 1 year';
                }
            }
 
            // Determine the market zip code (priority: user-entered zip > NPI address zip)
            const npiZip = (selectedProvider.addresses && selectedProvider.addresses[0])
                ? selectedProvider.addresses[0].postal_code.substring(0, 5)
                : '';
            const marketZip = zipCode || npiZip;
 
            // Determine the market city/state
            // Priority: zip lookup (from entered zip) > NPI address > empty
            let marketCity = city;
            let marketState = state;
            let marketCitySource = '';
 
            if (enrichedData.zipLookup) {
                // Zip lookup resolved — use it as the authoritative city for the market
                marketCity = enrichedData.zipLookup.city;
                marketState = enrichedData.zipLookup.state;
                if (zipCode) {
                    marketCitySource = ''; // User provided zip, lookup confirmed city — no annotation needed
                } else {
                    marketCitySource = '(from NPI address zip)';
                }
            } else if (!zipCode && npiZip) {
                marketCitySource = '(from NPI address)';
            }
 
            // Get demographics (priority: Census API with marketZip > embedded estimates)
            let demos;
            if (enrichedData.censusData) {
                demos = {
                    ...enrichedData.censusData,
                    city: marketCity,
                    state: marketState,
                    volumeIndicator: enrichedData.censusData.population > 45000 ? 'High-density urban area' : enrichedData.censusData.population < 30000 ? 'Lower-density suburban/rural area' : 'Standard volume area',
                    dataSource: `U.S. Census Bureau ACS 5-Year Estimates (ZIP ${marketZip})`
                };
            } else {
                demos = getDemographics(marketZip, marketState);
                demos.dataSource = marketZip ? `Regional estimates (ZIP ${marketZip})` : `State-level estimates (${marketState})`;
            }
 
            // Get insurance payers (use market state, not NPI address state)
            const payers = getInsurancePayers(marketState);
 
            // Get talking points
            const points = getTalkingPoints(specialty, taxonomyCode);
 
            // Get specialty treatment info
            const treatmentInfo = getSpecialtyTreatmentInfo(specialty);
 
            // Get recommended InStride resources for this provider type
            const recommendedResources = getRecommendedResources(specialty);
            const treatmentHTML = `
                <div class="brief-section-box brief-section-full">
                    <h3>Specialty & Treatment Focus</h3>
                    <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px;">
                        <div>
                            <p><strong>Common Presentations:</strong></p>
                            <ul style="list-style: none; padding-left: 0; font-size: 12px;">
                                ${treatmentInfo.presentations.map(p => `<li>• ${p}</li>`).join('')}
                            </ul>
                        </div>
                        <div>
                            <p><strong>Likely Methodologies:</strong></p>
                            <ul style="list-style: none; padding-left: 0; font-size: 12px;">
                                ${treatmentInfo.methodologies.map(m => `<li>• ${m}</li>`).join('')}
                            </ul>
                        </div>
                        <div>
                            <p><strong>InStride Relevance:</strong></p>
                            <p style="font-size: 12px; line-height: 1.5;">${treatmentInfo.instride_relevance}</p>
                        </div>
                    </div>
                    <p style="margin-top: 10px; font-size: 11px; color: #6b7280; font-style: italic;">
                        <strong>Note:</strong> Inferred from NPI taxonomy. Verify actual practice focus on their website or during the meeting.
                    </p>
                </div>
            `;
 
            // Summarize Open Payments data
            let openPaymentsHTML = '';
            if (enrichedData.openPayments) {
                const summary = summarizeOpenPayments(enrichedData.openPayments);
                if (summary) {
                    const topCompaniesHTML = summary.topCompanies
                        .map(c => `<li>• ${c.name}: $${(c.amount / 1000).toFixed(0)}k</li>`)
                        .join('');
                    openPaymentsHTML = `
                        <div class="brief-section-box highlight-amber brief-section-full">
                            <h3>Industry Relationships (Open Payments)</h3>
                            <p><strong>Total Payments:</strong><br>${summary.totalPayments} payments totaling $${(summary.totalAmount / 1000).toFixed(0)}k</p>
                            <p><strong>Top Paying Companies:</strong></p>
                            <ul style="list-style: none; padding-left: 0; font-size: 12px;">
                                ${topCompaniesHTML}
                            </ul>
                            <p style="margin-top: 8px; font-size: 11px;"><strong>Categories:</strong> ${summary.categories.map(c => `${c.name} (${c.count})`).join(', ')}</p>
                        </div>
                    `;
                } else {
                    openPaymentsHTML = `
                        <div class="brief-section-box brief-section-full">
                            <h3>Industry Relationships</h3>
                            <p><em>No Open Payments records found for this provider</em></p>
                        </div>
                    `;
                }
            }
 
            // Build research links HTML
            const researchLinksHTML = buildResearchLinksHTML(firstName, lastName, specialty, city, state, npiNumber);
 
            // Generate brief HTML
            const briefHTML = `
                <div class="brief-header">
                    <div class="brief-logo">IN STRIDE</div>
                    <div class="brief-title">
                        <h2>Provider Meeting Brief</h2>
                        <p>Meeting preparation document</p>
                    </div>
                    <div class="brief-meta">
                        <div class="tm-name-field"><strong>Territory Manager:</strong><br>${tmName}</div>
                        <div><strong>Generated:</strong><br>${formatDate(new Date())}</div>
                    </div>
                </div>
 
                <div class="brief-content">
                    <div class="brief-section-box">
                        <h3>Provider Snapshot</h3>
                        <p><strong>Name:</strong><br>${providerName}</p>
                        <p><strong>Primary Specialty:</strong><br>${specialty}</p>
                        <p><strong>NPI Number:</strong><br>${npiNumber}</p>
                        <p><strong>Years in Practice:</strong><br>${yearsInPractice}</p>
                        <p><strong>Medical School/Training:</strong><br>Not available via NPI - verify before meeting</p>
                        ${email ? `<p><strong>Email:</strong><br>${email}</p>` : ''}
                        ${researchLinksHTML}
                    </div>
 
                    <div class="brief-section-box">
                        <h3>Practice Information</h3>
                        <p><strong>Practice Name:</strong><br>${practiceName}</p>
                        <p><strong>Address:</strong><br>${address}</p>
                        <p><strong>Phone:</strong><br>${phone}</p>
                        <p><strong>Patient Volume Indicator:</strong><br>${demos.volumeIndicator}</p>
                    </div>
 
                    <div class="brief-section-box brief-section-full">
                        <h3>Market & Demographics Context</h3>
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                            <div>
                                <p><strong>Service Area:</strong><br>${marketCity ? marketCity + ', ' : ''}${marketState}${marketZip ? ' ' + marketZip : ''}${marketCitySource ? ' <em style="font-size:10px;">' + marketCitySource + '</em>' : ''}</p>
                                <p><strong>Population (Est.):</strong><br>${demos.population.toLocaleString()} residents</p>
                                <p><strong>Median Age:</strong><br>${demos.medianAge} years</p>
                                <p><strong>Pediatric Population:</strong><br>${demos.pctUnder18}% under 18</p>
                            </div>
                            <div>
                                <p><strong>Top Insurance Payers:</strong></p>
                                <ul style="list-style: none; padding-left: 0; font-size: 12px;">
                                    ${payers.slice(0, 4).map(p => `<li>• ${p}</li>`).join('')}
                                </ul>
                            </div>
                        </div>
                        <p style="margin-top: 12px; font-size: 11px; color: #6b7280; font-style: italic;">
                            <strong>Note:</strong> Demographics are from ${demos.dataSource}—verify with local market data.
                        </p>
                    </div>
 
                    ${treatmentHTML}
 
                    ${openPaymentsHTML}
 
                    <div class="brief-section-box brief-section-full">
                        <h3>InStride Positioning</h3>
                        <ul class="positioning-bullets">
                            ${points.map(p => `<li>${p}</li>`).join('')}
                        </ul>
                    </div>
 
                    <div class="brief-section-box brief-section-full" style="background: #f0fdfa; border-left: 4px solid #0d9488;">
                        <h3 style="color: #0d9488;">Recommended InStride Resources for This Provider</h3>
                        <p style="font-size: 11px; color: #6b7280; margin-bottom: 12px; font-style: italic;">${recommendedResources.reasoning}</p>
                        <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px;">
                            <div>
                                <p style="font-weight: 700; font-size: 12px; margin-bottom: 6px; color: #0d9488;">Webinars & Videos</p>
                                <ul style="list-style: none; padding-left: 0; font-size: 11px; line-height: 1.8;">
                                    ${recommendedResources.webinars.map(w => `<li>• <a href="${w.url}" target="_blank" style="color: #0d9488;">${w.title}</a></li>`).join('')}
                                    <li style="margin-top: 4px;">• <a href="${instrideResources.youtubePlaylist}" target="_blank" style="color: #0d9488;">All Webinar Recordings (YouTube)</a></li>
                                </ul>
                            </div>
                            <div>
                                <p style="font-weight: 700; font-size: 12px; margin-bottom: 6px; color: #0d9488;">Articles & Evidence</p>
                                <ul style="list-style: none; padding-left: 0; font-size: 11px; line-height: 1.8;">
                                    ${recommendedResources.articles.map(a => `<li>• <a href="${a.url}" target="_blank" style="color: #0d9488;">${a.title}</a></li>`).join('')}
                                    <li style="margin-top: 4px;">• <a href="${instrideResources.allResources}" target="_blank" style="color: #0d9488;">All Resources</a></li>
                                </ul>
                            </div>
                            <div>
                                <p style="font-weight: 700; font-size: 12px; margin-bottom: 6px; color: #0d9488;">Print Collateral to Bring</p>
                                <ul style="list-style: none; padding-left: 0; font-size: 11px; line-height: 1.8;">
                                    ${recommendedResources.print.map(p => `<li>• ${p.title}</li>`).join('')}
                                </ul>
                            </div>
                        </div>
                    </div>
                </div>
 
                <div class="disclaimer">
                    <strong>Disclaimer:</strong> This brief was generated using publicly available NPI Registry data and demographic estimates.
                    All information should be verified with current provider records and local market data before the meeting.
                    This document is for internal use only and contains confidential business information.
                </div>
            `;
 
            document.getElementById('briefContent').innerHTML = briefHTML;
            document.getElementById('formSection').classList.add('hidden');
            document.getElementById('briefSection').classList.add('visible');
            document.getElementById('providerSelector').classList.remove('visible');
            showSuccess('Brief generated successfully!');
        }
 
        function getDemographics(zipCode, state) {
            let demos = demoDataByZip[zipCode];
 
            if (!demos && state && stateAverageDemos[state]) {
                demos = { ...stateAverageDemos[state], city: 'Area', state: state };
            }
 
            if (!demos) {
                demos = { population: 35000, medianAge: 37, pctUnder18: 19, city: 'Service Area', state: state || 'US' };
            }
 
            let volumeIndicator = 'Standard volume area';
            if (demos.population > 45000) {
                volumeIndicator = 'High-density urban area';
            } else if (demos.population < 30000) {
                volumeIndicator = 'Lower-density suburban/rural area';
            }
 
            return { ...demos, volumeIndicator };
        }
 
        function getInsurancePayers(state) {
            const stateCode = state ? state.toUpperCase() : 'CA';
            return insuranceByState[stateCode] || insuranceByState['CA'];
        }
 
        function getTalkingPoints(specialty, taxonomyCode) {
            const specialtyLower = specialty.toLowerCase();
 
            if (specialtyLower.includes('pediatric') || specialtyLower.includes('pediatrician')) {
                return talkingPointsBySpecialty.pediatrics;
            } else if (specialtyLower.includes('family') || specialtyLower.includes('general practice')) {
                return talkingPointsBySpecialty['family medicine'];
            } else if (specialtyLower.includes('psychiatry') || specialtyLower.includes('psychiatrist')) {
                return talkingPointsBySpecialty.psychiatry;
            } else if (specialtyLower.includes('psychology') || specialtyLower.includes('psychologist')) {
                return talkingPointsBySpecialty.psychology;
            } else if (specialtyLower.includes('nurse practitioner') || specialtyLower.includes('physician assistant')) {
                return talkingPointsBySpecialty['nurse practitioner'];
            }
 
            return talkingPointsBySpecialty.default;
        }
 
        function formatDate(date) {
            const options = { year: 'numeric', month: 'short', day: 'numeric' };
            return date.toLocaleDateString('en-US', options);
        }
 
        function downloadPDF() {
            const briefContent = document.getElementById('briefContent');
            const tmName = document.getElementById('tmName').value.trim() || 'Brief';
            const fileName = `InStride-Provider-Brief-${formatDate(new Date()).replace(/\s/g, '-')}.pdf`;
 
            const opt = {
                margin: 10,
                filename: fileName,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2 },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };
 
            html2pdf().set(opt).from(briefContent).save();
        }
 
        function backToForm() {
            document.getElementById('formSection').classList.remove('hidden');
            document.getElementById('briefSection').classList.remove('visible');
            selectedProvider = null;
            enrichedData = { openPayments: null, censusData: null, careCompareData: null, zipLookup: null };
        }
 
        function resetForm() {
            document.getElementById('firstName').value = '';
            document.getElementById('lastName').value = '';
            document.getElementById('zipCode').value = '';
            document.getElementById('practiceName').value = '';
            document.getElementById('email').value = '';
            document.getElementById('tmName').value = '';
            document.getElementById('errorMessage').classList.remove('visible');
            document.getElementById('successMessage').classList.remove('visible');
            document.getElementById('providerSelector').classList.remove('visible');
            selectedProvider = null;
            currentProviderResults = [];
            enrichedData = { openPayments: null, censusData: null, careCompareData: null, zipLookup: null };
        }
 
        // Add Enter key support for form
        document.addEventListener('DOMContentLoaded', function() {
            const inputs = document.querySelectorAll('input[type="text"], input[type="email"]');
            inputs.forEach(input => {
                input.addEventListener('keypress', function(e) {
                    if (e.key === 'Enter' && document.getElementById('formSection').style.display !== 'none') {
                        generateBrief();
                    }
                });
            });
        });
    </script>
</body>
